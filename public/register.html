<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Shop In</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <!-- Background Animation Elements -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <div class="auth-container">
        <div class="logo-header">
            <h1 class="logo-text" style="font-size: 1.5rem;">Create Account</h1>
        </div>

        <form class="auth-form" id="registerForm">
            <div id="error-msg" class="error-msg"></div>

            <div class="input-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required>
            </div>

            <button type="submit" class="auth-btn" id="registerBtn">Sign Up</button>

            <div class="auth-links">
                <p>Already have an account? <a href="login.html">Sign in</a></p>
                <p style="margin-top: 15px;"><a href="index.html" style="font-weight: normal; font-size: 0.8rem;">← Back to Store</a></p>
            </div>
        </form>
    </div>

    <script src="auth.js"></script>
</body>
</html>
