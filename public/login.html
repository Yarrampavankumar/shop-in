<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Shop In</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <!-- Background Animation Elements -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <div class="auth-container">
        <div class="logo-header">
            <h1 class="logo-text">SHOP-IN</h1>
        </div>

        <form class="auth-form" id="loginForm">
            <div id="error-msg" class="error-msg"></div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="auth-btn" id="loginBtn">Sign In</button>
            <button type="button" class="auth-btn" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.5); color: #fff; margin-top: 5px;" onclick="window.location.href='register.html'">Create Account</button>

            <div class="auth-links">
                <p style="margin-top: 15px;"><a href="index.html" style="font-weight: normal; font-size: 0.8rem;">← Back to Store</a></p>
            </div>
        </form>
    </div>

    <script src="auth.js"></script>
</body>
</html>
