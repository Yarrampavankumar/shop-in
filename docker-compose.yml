services:
  app:
    build: .
    container_name: shopin-app
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=Pavan@9639
      - DB_NAME=ecommerce_db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: shopin-db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: Pavan@9639
      MYSQL_DATABASE: ecommerce_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Automatically initialize the database layout when the container spins up
      - ./database.sql:/docker-entrypoint-initdb.d/1-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pPavan@9639"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
